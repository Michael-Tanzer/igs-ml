_target_: src.models.modules.base.BaseLitModule

# ViT-family models (Swin, MViTv2, CoAtNet, MaxViT, ConvNeXtV2) need:
#   - AdamW with decoupled weight decay (not Adam)
#   - Linear LR warmup to avoid destroying pretrained attention at init
#   - Cosine decay thereafter

warmup_ratio: 0.02  # 2% of total training steps for linear warmup

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 5e-5
  weight_decay: 0.05

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  eta_min: 1e-7
  # T_max is injected automatically at runtime as (total_steps - warmup_steps)

criteria:
  - _target_: src.models.losses.simple_losses.DataObjectLoss
    loss_fn:
      _target_: torch.nn.BCEWithLogitsLoss
      pos_weight:
        _target_: torch.tensor
        data: [1.9679]  # n_neg/n_pos = 341230/173394 (scripts/compute_class_weights.py)
    name: bce

metrics:
  - _target_: src.models.metrics.simple_metrics.BinaryAccuracyMetric
    threshold: 0.0              # model outputs logits, so decision boundary is 0
  - _target_: src.models.metrics.simple_metrics.BinaryAUROCMetric
  - _target_: src.models.metrics.simple_metrics.BinaryF1Metric
    threshold: 0.0
  - _target_: src.models.metrics.simple_metrics.BinaryPrecisionMetric
    threshold: 0.0
  - _target_: src.models.metrics.simple_metrics.BinaryRecallMetric
    threshold: 0.0
  - _target_: src.models.metrics.simple_metrics.BinarySpecificityMetric
    threshold: 0.0
  - _target_: src.models.metrics.simple_metrics.BinaryAveragePrecisionMetric

epoch_metrics:
  - _target_: src.models.metrics.malaria_metrics.MalariaPatientMetrics
    threshold: 0.0              # initial value only; overwritten after each train epoch by OptimalThresholdMetrics
  - _target_: src.models.metrics.malaria_metrics.OptimalThresholdMetrics

log_metrics_every_n_steps: 10
