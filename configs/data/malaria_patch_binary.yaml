_target_: src.data.malaria_patch_datamodule.MalariaPatchDataModule

db: ${db}
query_path: src/queries/malaria/binary_classification.sql
image_root: /data/mtanzer/autoscope_images
patch_size: 144
label_column: y_binary_strict    # y_binary_strict or y_binary_inclusive or y_binary_matlab
z_mode: all                      # "all" (3N ch) or "best" (3 ch, Brenner)
max_z: 11                        # fixed z-slice count for z_mode=all (pads/truncates)
io_threads: 11                   # threads per worker for parallel z-slice I/O

patch_cache: require             # "auto", "require", or "off"
patch_cache_version: 1           # bump to manually invalidate precomputed patches
patch_cache_mmap: false           # mmap cached .npy for faster reads
precompute_workers: 1           # parallel processes for patch precomputation

train_val_test_split: [0.7, 0.15, 0.15]
split_seed: 42

batch_size: 128
num_workers: 16
prefetch_factor: 2
persistent_workers: true
pin_memory: true

cache_dir: ${paths.data_dir}/malaria_cache

# Transforms -- Hydra-instantiable lists, composed at runtime.
# transforms_train = transforms_base + transforms_augment  (training)
# transforms_eval  = transforms_base                       (val / test)
transforms_base:
  - _target_: torchvision.transforms.ToTensor
  - _target_: torchvision.transforms.Resize
    size: [224, 224]
  - _target_: src.data.components.transforms.RepeatNormalize
    mean: [0.206, 0.194, 0.235]  # computed by scripts/compute_dataset_stats.py over 514k train patches
    std:  [0.313, 0.292, 0.347]
transforms_augment:
  - _target_: torchvision.transforms.RandomHorizontalFlip
    p: 0.5
  - _target_: torchvision.transforms.RandomVerticalFlip
    p: 0.5
  - _target_: torchvision.transforms.RandomRotation
    degrees: 180
  - _target_: torchvision.transforms.ColorJitter
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
