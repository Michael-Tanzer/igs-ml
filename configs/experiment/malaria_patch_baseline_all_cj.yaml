# @package _global_
# Same as malaria_patch_baseline_all but with MultiplaneColorJitter augmentation.
# MultiplaneColorJitter applies ColorJitter independently per 3-ch z-plane,
# enabling color augmentation for 33-channel z_mode=all inputs.

defaults:
  - /model/architectures: efficientnet_b4
  - override /data: malaria_patch_binary
  - override /model: malaria_patch
  - override /trainer: gpu
  - override /callbacks: default
  - override /logger: aim
  - override /paths: igs

tags: ["malaria", "binary-classification", "efficientnet", "baseline"]
seed: 42
train: true
test: true

data:
  z_mode: all
  transforms_augment:
    - _target_: torchvision.transforms.RandomHorizontalFlip
      p: 0.5
    - _target_: torchvision.transforms.RandomVerticalFlip
      p: 0.5
    - _target_: torchvision.transforms.RandomRotation
      degrees: 180
    - _target_: src.data.components.transforms.MultiplaneColorJitter
      brightness: 0.2
      contrast: 0.2
      saturation: 0.3
      hue: 0.05

model:
  net:
    model:
      in_chans: 33    # 3 * max_z (11)
      num_classes: 1

logger:
  aim:
    repo: /data/mtanzer/aim/
    experiment: malaria_patch_baseline

callbacks:
  model_checkpoint:
    monitor: val/auroc
    mode: max
  early_stopping:
    monitor: val/auroc
    mode: max
    patience: 15
  dual_threshold_calibrator:
    _target_: src.models.callbacks.dual_threshold_calibrator.DualThresholdCalibrator
    target_specificity: 0.95
    calibrate_on: val
  batch_size_finder:
    _target_: src.models.callbacks.batch_size_finder.BatchSizeFinder
    mode: binsearch
    steps_per_trial: 3
    init_val: 64
    max_trials: 25
    batch_arg_name: batch_size_per_device
    margin: 0.20

trainer:
  max_epochs: 50
