# @package _global_
# Stronger augmentation variant of baseline_best.
# Adds GaussianBlur, RandomErasing, stronger ColorJitter with hue.

defaults:
  - /model/architectures: efficientnet_b4
  - override /data: malaria_patch_binary
  - override /model: malaria_patch
  - override /trainer: gpu
  - override /callbacks: default
  - override /logger: aim
  - override /paths: igs

tags: ["malaria", "binary-classification", "efficientnet", "strong-aug"]
seed: 42
train: true
test: true

data:
  z_mode: best
  transforms_augment:
    - _target_: torchvision.transforms.RandomHorizontalFlip
      p: 0.5
    - _target_: torchvision.transforms.RandomVerticalFlip
      p: 0.5
    - _target_: torchvision.transforms.RandomRotation
      degrees: 180
    - _target_: torchvision.transforms.ColorJitter
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.05
    - _target_: torchvision.transforms.GaussianBlur
      kernel_size: 3
      sigma:
        - 0.1
        - 2.0
    - _target_: torchvision.transforms.RandomErasing
      p: 0.1
      scale:
        - 0.02
        - 0.1

model:
  net:
    model:
      in_chans: 3
      num_classes: 1

logger:
  aim:
    repo: /data/mtanzer/aim/
    experiment: malaria_patch_autoresearch

callbacks:
  model_checkpoint:
    monitor: val/auroc
    mode: max
  early_stopping:
    monitor: val/auroc
    mode: max
    patience: 15
  dual_threshold_calibrator:
    _target_: src.models.callbacks.dual_threshold_calibrator.DualThresholdCalibrator
    target_specificity: 0.95
    calibrate_on: val
  batch_size_finder:
    _target_: src.models.callbacks.batch_size_finder.BatchSizeFinder
    mode: binsearch
    steps_per_trial: 3
    init_val: 64
    max_trials: 25
    batch_arg_name: batch_size_per_device
    margin: 0.20

trainer:
  max_epochs: 50
