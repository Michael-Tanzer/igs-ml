# @package _global_
# Focal loss variant of the baseline_best experiment.
# Uses BinaryFocalLoss (gamma=2, alpha=0.66) instead of BCEWithLogitsLoss.

defaults:
  - /model/architectures: efficientnet_b4
  - override /data: malaria_patch_binary
  - override /model: malaria_patch
  - override /trainer: gpu
  - override /callbacks: default
  - override /logger: aim
  - override /paths: igs

tags: ["malaria", "binary-classification", "efficientnet", "focal-loss"]
seed: 42
train: true
test: true

data:
  z_mode: best

model:
  net:
    model:
      in_chans: 3
      num_classes: 1

  criteria:
    - _target_: src.models.losses.simple_losses.DataObjectLoss
      loss_fn:
        _target_: src.models.losses.focal_loss.BinaryFocalLoss
        alpha: 0.66
        gamma: 2.0
      name: focal

logger:
  aim:
    repo: /data/mtanzer/aim/
    experiment: malaria_patch_autoresearch

callbacks:
  model_checkpoint:
    monitor: val/auroc
    mode: max
  early_stopping:
    monitor: val/auroc
    mode: max
    patience: 15
  dual_threshold_calibrator:
    _target_: src.models.callbacks.dual_threshold_calibrator.DualThresholdCalibrator
    target_specificity: 0.95
    calibrate_on: val
  batch_size_finder:
    _target_: src.models.callbacks.batch_size_finder.BatchSizeFinder
    mode: binsearch
    steps_per_trial: 3
    init_val: 64
    max_trials: 25
    batch_arg_name: batch_size_per_device
    margin: 0.20

trainer:
  max_epochs: 50
