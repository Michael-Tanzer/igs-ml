# @package _global_

defaults:
  - /model/architectures: efficientnet_b4
  - override /data: malaria_patch_binary
  - override /model: malaria_patch
  - override /trainer: gpu
  - override /callbacks: default
  - override /logger: aim
  - override /paths: igs

tags: ["malaria", "binary-classification", "efficientnet", "baseline"]
seed: 42
train: true
test: true

data:
  z_mode: best

model:
  net:
    model:
      in_chans: 3
      num_classes: 1

logger:
  aim:
    repo: /data/mtanzer/aim/
    experiment: malaria_patch_baseline

callbacks:
  model_checkpoint:
    monitor: val/auroc
    mode: max
  early_stopping:
    monitor: val/auroc
    mode: max
    patience: 15
  threshold_calibrator:
    _target_: src.models.callbacks.threshold_calibrator.ThresholdCalibrator
    mode: max
    calibrate_on: val
    criterion:
      _target_: torchmetrics.classification.BinaryF1Score
      threshold: 0.5
  # batch_size_finder:
  #   _target_: src.models.callbacks.batch_size_finder.BatchSizeFinder
  #   mode: binsearch
  #   steps_per_trial: 3
  #   init_val: 64
  #   max_trials: 25
  #   batch_arg_name: batch_size_per_device

trainer:
  max_epochs: 50
