# @package _global_

defaults:
  - /model/architectures: efficientnet_b4
  - override /data: malaria_patch_binary
  - override /model: malaria_patch
  - override /trainer: gpu
  - override /callbacks: default
  - override /logger: aim
  - override /paths: igs

tags: ["malaria", "binary-classification", "efficientnet", "baseline"]
seed: 42
train: true
test: true

data:
  z_mode: best

model:
  net:
    model:
      in_chans: 3
      num_classes: 1

logger:
  aim:
    repo: /data/mtanzer/aim/
    experiment: malaria_patch_baseline

callbacks:
  model_checkpoint:
    monitor: "val/loss"
    mode: "min"
  early_stopping:
    monitor: "val/loss"
    mode: "min"
    patience: 15

trainer:
  max_epochs: 50
